name: Build ksuinit
on:
  workflow_call:
    inputs:
      os:
        required: false
        type: string
        default: ubuntu-latest
jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        
    - name: Setup rustup
      run: |
        rustup update stable
        rustup target add aarch64-unknown-linux-musl
        rustup target add x86_64-unknown-linux-musl

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: . -> target
        cache-targets: false

    - name: Build ksuinit
      run: |
        LLVM_BIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
        export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER="$LLVM_BIN/aarch64-linux-android26-clang"
        export RUSTFLAGS="-C link-arg=-no-pie"
        cargo build --package ksuinit --target=aarch64-unknown-linux-musl --release

    - name: Upload ksuinit artifact
      uses: actions/upload-artifact@v7
      with:
        name: ksuinit-aarch64
        path: target/aarch64-unknown-linux-musl/release/ksuinit

    - name: Build ksuinit x64
      run: |
        LLVM_BIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
        export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER="$LLVM_BIN/x86_64-linux-android26-clang"
        cargo build --package ksuinit --target=x86_64-unknown-linux-musl --release

    - name: Upload x64 ksuinit artifact
      uses: actions/upload-artifact@v7
      with:
        name: ksuinit-x86_64
        path: target/x86_64-unknown-linux-musl/release/ksuinit